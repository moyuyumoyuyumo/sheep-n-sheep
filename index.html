<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咩了个咩</title>
    <link rel="stylesheet" href="./styles/base.css">
</head>
<body>
    <div id="app">
        <header class="game-header">
            <h1>咩了个咩</h1>
            <span id="status-badge" class="status-badge" data-status="idle">准备中</span>
            <button id="btn-mute"    class="btn btn-ghost" type="button" title="开关音效">🔊</button>
            <button id="btn-back-to-menu" class="btn btn-ghost" type="button" title="返回选关">← 选关</button>
        </header>

        <main class="game-stage">
            <!-- 牌堆容器：render.js 会在这里 absolute 摆牌 -->
            <div id="board" class="board"></div>

            <!-- 底部槽：7 个格子，render.js 填入 -->
            <div id="slot" class="slot"></div>

            <!-- 道具栏：render.js 控制次数 + disabled -->
            <div id="toolbar" class="toolbar">
                <button id="btn-undo" class="btn-tool" type="button" title="撤回最后一张">
                    <span class="tool-icon">↶</span>
                    <span class="tool-name">撤回</span>
                    <span class="tool-count" id="tool-count-undo">3</span>
                </button>
                <button id="btn-shuffle" class="btn-tool" type="button" title="洗牌">
                    <span class="tool-icon">🔀</span>
                    <span class="tool-name">洗牌</span>
                    <span class="tool-count" id="tool-count-shuffle">2</span>
                </button>
                <button id="btn-remove" class="btn-tool" type="button" title="移除前 3 张">
                    <span class="tool-icon">⤴</span>
                    <span class="tool-name">移除</span>
                    <span class="tool-count" id="tool-count-remove">1</span>
                </button>
                <button id="btn-watch-ad-toolbar" class="btn-tool btn-tool-ad" type="button" title="看广告 +1 撤回">
                    <span class="tool-icon">📺</span>
                    <span class="tool-name">+广告</span>
                </button>
            </div>

            <p class="muted hint">
                白色清晰的牌可以点（上层）<br>
                灰色的被压住，要先把上面的清掉<br>
                <small>凑齐 3 张同 symbol 自动消除</small>
            </p>
        </main>

        <!-- 选关菜单：render.js 控制显隐 -->
        <section id="menu" class="menu hidden">
            <h2 class="menu-title">选择关卡</h2>

            <!-- 钱包栏：余额 + 今日签到 + 看广告 -->
            <div class="wallet-bar">
                <div class="wallet-balance" title="道具余额跨关卡保留">
                    <span class="wallet-item" title="撤回"><span class="tool-icon">↶</span><b id="wallet-undo">0</b></span>
                    <span class="wallet-item" title="洗牌"><span class="tool-icon">🔀</span><b id="wallet-shuffle">0</b></span>
                    <span class="wallet-item" title="移除"><span class="tool-icon">⤴</span><b id="wallet-remove">0</b></span>
                </div>
                <div class="wallet-actions">
                    <button id="btn-daily"    class="btn btn-primary btn-sm" type="button" title="每天免费领一次">🎁 <span id="btn-daily-text">今日签到</span></button>
                    <button id="btn-watch-ad" class="btn btn-ghost btn-sm"   type="button" title="看完一条广告 +1 撤回">📺 看广告 +1 撤回</button>
                </div>
            </div>

            <div id="level-grid" class="level-grid"></div>
        </section>

        <!-- 胜负弹窗：游戏结束时由 render.js 控制显示 + 设置按钮 -->
        <div id="modal-overlay" class="modal-overlay hidden" aria-hidden="true">
            <div class="modal-card" role="dialog" aria-labelledby="modal-title">
                <div id="modal-icon" class="modal-icon">🎉</div>
                <h2 id="modal-title" class="modal-title">胜利！</h2>
                <p id="modal-subtitle" class="modal-subtitle">挑战成功</p>
                <div class="modal-actions">
                    <button id="btn-modal-primary"   class="btn btn-primary" type="button">下一关</button>
                    <button id="btn-modal-secondary" class="btn btn-ghost"   type="button">再来一次</button>
                </div>
            </div>
        </div>

        <footer class="game-footer">
            <p class="muted tiny">
                非官方学习项目 ·
                <a href="https://github.com/moyuyumoyuyumo/sheep-n-sheep" target="_blank" rel="noopener">GitHub</a>
                · 阶段 6 道具钱包 / 签到 / 广告 / 后门
            </p>
        </footer>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
