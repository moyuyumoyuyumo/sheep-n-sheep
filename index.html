<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咩了个咩</title>
    <link rel="stylesheet" href="./styles/base.css">
</head>
<body>
    <div id="app">
        <header class="game-header">
            <h1>咩了个咩</h1>
            <span id="status-badge" class="status-badge" data-status="idle">准备中</span>
            <button id="btn-mute"    class="btn btn-ghost" type="button" title="开关音效">🔊</button>
            <button id="btn-restart" class="btn btn-ghost" type="button" title="重新开始">↻ 重开</button>
        </header>

        <main class="game-stage">
            <!-- 牌堆容器：render.js 会在这里 absolute 摆牌 -->
            <div id="board" class="board"></div>

            <!-- 底部槽：7 个格子，render.js 填入 -->
            <div id="slot" class="slot"></div>

            <p class="muted hint">
                白色清晰的牌可以点（上层）<br>
                灰色的被压住，要先把上面的清掉<br>
                <small>凑齐 3 张同 symbol 自动消除</small>
            </p>
        </main>

        <!-- 胜负弹窗：游戏结束时由 render.js 控制显示 -->
        <div id="modal-overlay" class="modal-overlay hidden" aria-hidden="true">
            <div class="modal-card" role="dialog" aria-labelledby="modal-title">
                <div id="modal-icon" class="modal-icon">🎉</div>
                <h2 id="modal-title" class="modal-title">胜利！</h2>
                <p id="modal-subtitle" class="modal-subtitle">挑战成功</p>
                <button id="btn-play-again" class="btn btn-primary" type="button">再来一局</button>
            </div>
        </div>

        <footer class="game-footer">
            <p class="muted tiny">
                非官方学习项目 ·
                <a href="https://github.com/moyuyumoyuyumo/sheep-n-sheep" target="_blank" rel="noopener">GitHub</a>
                · 阶段 1 最小可玩
            </p>
        </footer>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
