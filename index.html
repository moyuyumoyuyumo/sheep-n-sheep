<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咩了个咩</title>
    <link rel="stylesheet" href="./styles/base.css">
</head>
<body>
    <div id="app">
        <header class="game-header">
            <h1>咩了个咩</h1>
            <span id="status-badge" class="status-badge" data-status="idle">准备中</span>
            <button id="btn-mute"    class="btn btn-ghost" type="button" title="开关音效">🔊</button>
            <button id="btn-bgm"     class="btn btn-ghost" type="button" title="开关背景音乐">🎵</button>
            <button id="btn-back-to-menu" class="btn btn-ghost" type="button" title="返回选关">← 选关</button>
        </header>

        <main class="game-stage">
            <!-- 板子视口：板宽超屏时启用左右滑动（手机原生 pan + 桌面鼠标拖拽） -->
            <div class="board-viewport">
                <!-- 牌堆容器：render.js 会在这里 absolute 摆牌 -->
                <div id="board" class="board"></div>
            </div>

            <!-- 底部槽：7 个格子，render.js 填入 -->
            <div id="slot" class="slot"></div>

            <!-- 道具栏：render.js 控制次数 + disabled -->
            <div id="toolbar" class="toolbar">
                <button id="btn-undo" class="btn-tool" type="button" title="撤回最后一张">
                    <span class="tool-icon">↶</span>
                    <span class="tool-name">撤回</span>
                    <span class="tool-count" id="tool-count-undo">3</span>
                </button>
                <button id="btn-shuffle" class="btn-tool" type="button" title="洗牌">
                    <span class="tool-icon">🔀</span>
                    <span class="tool-name">洗牌</span>
                    <span class="tool-count" id="tool-count-shuffle">2</span>
                </button>
                <button id="btn-remove" class="btn-tool" type="button" title="移除前 3 张">
                    <span class="tool-icon">⤴</span>
                    <span class="tool-name">移除</span>
                    <span class="tool-count" id="tool-count-remove">1</span>
                </button>
                <button id="btn-watch-ad-toolbar" class="btn-tool btn-tool-ad" type="button" title="看广告 +1 撤回">
                    <span class="tool-icon">📺</span>
                    <span class="tool-name">+广告</span>
                </button>
            </div>

            <p class="muted hint">
                白色清晰的牌可以点（上层）<br>
                灰色的被压住，要先把上面的清掉<br>
                <small>凑齐 3 张同 symbol 自动消除</small>
            </p>
        </main>

        <!-- 选关菜单：render.js 控制显隐 -->
        <section id="menu" class="menu hidden">
            <!-- Hero 区：黑白可爱羊 + 大标题 -->
            <div class="menu-hero">
                <svg class="hero-sheep" viewBox="0 0 140 130" xmlns="http://www.w3.org/2000/svg" aria-label="咩了个咩吉祥物">
                    <!-- 身体云朵（白） -->
                    <ellipse cx="70" cy="82" rx="42" ry="30" fill="#fff" stroke="#1f2937" stroke-width="2.5"/>
                    <circle cx="38"  cy="72" r="15" fill="#fff" stroke="#1f2937" stroke-width="2.5"/>
                    <circle cx="55"  cy="60" r="15" fill="#fff" stroke="#1f2937" stroke-width="2.5"/>
                    <circle cx="75"  cy="58" r="16" fill="#fff" stroke="#1f2937" stroke-width="2.5"/>
                    <circle cx="95"  cy="62" r="15" fill="#fff" stroke="#1f2937" stroke-width="2.5"/>
                    <circle cx="108" cy="75" r="13" fill="#fff" stroke="#1f2937" stroke-width="2.5"/>
                    <!-- 脸（黑） -->
                    <ellipse cx="70" cy="68" rx="21" ry="19" fill="#1f2937"/>
                    <!-- 耳朵 -->
                    <ellipse cx="50" cy="55" rx="6" ry="10" fill="#1f2937" transform="rotate(-22 50 55)"/>
                    <ellipse cx="90" cy="55" rx="6" ry="10" fill="#1f2937" transform="rotate(22 90 55)"/>
                    <!-- 额前的一簇毛（白） -->
                    <path d="M 53 60 Q 70 42 87 60 Q 80 52 70 51 Q 60 52 53 60 Z" fill="#fff" stroke="#1f2937" stroke-width="2"/>
                    <!-- 眼睛（白眼珠 + 黑眼仁） -->
                    <circle cx="61" cy="68" r="4.5" fill="#fff"/>
                    <circle cx="79" cy="68" r="4.5" fill="#fff"/>
                    <circle cx="61.5" cy="69" r="2"   fill="#1f2937"/>
                    <circle cx="79.5" cy="69" r="2"   fill="#1f2937"/>
                    <!-- 腾e脸赏（淑女） -->
                    <circle cx="54" cy="75" r="3" fill="#fbbf24" opacity="0.55"/>
                    <circle cx="86" cy="75" r="3" fill="#fbbf24" opacity="0.55"/>
                    <!-- 嘴 -->
                    <path d="M 66 78 Q 70 82 74 78" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
                    <!-- 4 条腿 -->
                    <rect x="45"  y="107" width="6" height="15" rx="2" fill="#1f2937"/>
                    <rect x="60"  y="110" width="6" height="15" rx="2" fill="#1f2937"/>
                    <rect x="76"  y="110" width="6" height="15" rx="2" fill="#1f2937"/>
                    <rect x="91"  y="107" width="6" height="15" rx="2" fill="#1f2937"/>
                </svg>
                <h2 class="hero-title">咩了个咩</h2>
                <p class="hero-subtitle">三消益智 · 凑齐三张相同全部消除</p>
            </div>

            <h3 class="menu-title">选择关卡</h3>

            <!-- 钱包栏：余额 + 今日签到 + 看广告 -->
            <div class="wallet-bar">
                <div class="wallet-balance" title="道具余额跨关卡保留">
                    <span class="wallet-item" title="撤回"><span class="tool-icon">↶</span><b id="wallet-undo">0</b></span>
                    <span class="wallet-item" title="洗牌"><span class="tool-icon">🔀</span><b id="wallet-shuffle">0</b></span>
                    <span class="wallet-item" title="移除"><span class="tool-icon">⤴</span><b id="wallet-remove">0</b></span>
                </div>
                <div class="wallet-actions">
                    <button id="btn-daily"    class="btn btn-primary btn-sm" type="button" title="每天免费领一次">🎁 <span id="btn-daily-text">今日签到</span></button>
                    <button id="btn-watch-ad" class="btn btn-ghost btn-sm"   type="button" title="看完一条广告 +1 撤回">📺 看广告 +1 撤回</button>
                </div>
            </div>

            <div id="level-grid" class="level-grid"></div>
        </section>

        <!-- 胜负弹窗：游戏结束时由 render.js 控制显示 + 设置按钮 -->
        <div id="modal-overlay" class="modal-overlay hidden" aria-hidden="true">
            <div class="modal-card" role="dialog" aria-labelledby="modal-title">
                <div id="modal-icon" class="modal-icon">🎉</div>
                <h2 id="modal-title" class="modal-title">胜利！</h2>
                <p id="modal-subtitle" class="modal-subtitle">挑战成功</p>
                <div class="modal-actions">
                    <button id="btn-modal-primary"   class="btn btn-primary" type="button">下一关</button>
                    <button id="btn-modal-secondary" class="btn btn-ghost"   type="button">再来一次</button>
                </div>
            </div>
        </div>

        <footer class="game-footer">
            <p class="muted tiny">
                非官方学习项目 ·
                <a href="https://github.com/moyuyumoyuyumo/sheep-n-sheep" target="_blank" rel="noopener">GitHub</a>
                · 阶段 6 道具钱包 / 签到 / 广告 / 后门
            </p>
        </footer>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
